<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In — BrandPulse</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #F5F6F8; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 16px; }
    .card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,.07); }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .logo-mark { width: 32px; height: 32px; background: #DC2626; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .logo-mark span { color: white; font-weight: 800; font-size: 13px; }
    .logo-text { font-weight: 700; font-size: 16px; color: #111827; }
    h1 { font-size: 22px; font-weight: 700; color: #111827; margin: 0 0 4px; }
    .sub { font-size: 13px; color: #6B7280; margin: 0 0 28px; }
    .alert { background: #FEF2F2; border: 1px solid #FECACA; color: #B91C1C; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 5px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 14px; color: #111827; outline: none; transition: border-color .15s; margin-bottom: 16px; }
    input:focus { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    button { width: 100%; padding: 11px; background: #111827; color: white; font-size: 14px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: background .15s; }
    button:hover { background: #1F2937; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark"><span>BP</span></div>
      <span class="logo-text">BrandPulse</span>
    </div>

    <h1>Sign in</h1>
    <p class="sub">Brand intelligence for your team</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
        <div class="alert">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/login{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com"/>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••"/>

      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
