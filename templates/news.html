<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>客善 Hakshan — All News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: {
          sans: ['Inter','sans-serif'],
          mono: ['Fira Code','monospace'],
          zh:   ['Noto Sans SC','sans-serif'],
        }
      }}
    }
  </script>
  <style>
    html { scroll-padding-top: 52px; }
    body { font-family:'Inter',sans-serif; background:#FAFAFA; }
    .mono { font-family:'Fira Code',monospace; }
    .zh   { font-family:'Noto Sans SC',sans-serif; }

    .tag { display:inline-flex; align-items:center; padding:2px 7px; border-radius:4px; font-size:.6875rem; font-weight:500; white-space:nowrap; }
    .tag-red    { background:#FEF2F2; color:#DC2626; }
    .tag-amber  { background:#FFFBEB; color:#B45309; }
    .tag-green  { background:#F0FDF4; color:#16A34A; }
    .tag-blue   { background:#EFF6FF; color:#2563EB; }
    .tag-gray   { background:#F9FAFB; color:#4B5563; border:1px solid #E5E7EB; }

    .tab { padding:5px 12px; font-size:.8125rem; font-weight:500; border-radius:6px; cursor:pointer; transition:all .15s; color:#6B7280; display:inline-flex; align-items:center; gap:5px; }
    .tab:hover { background:#F3F4F6; color:#374151; }
    .tab.active { background:#111827; color:#fff; }
    .tab .count { font-size:.65rem; font-family:'Fira Code',monospace; opacity:.7; }
    .tab.active .count { opacity:.8; }

    .section-label { font-size:.6875rem; font-weight:500; letter-spacing:.08em; text-transform:uppercase; color:#9CA3AF; display:block; }

    .spin { animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .skeleton { background:#F3F4F6; border-radius:8px; animation:pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  </style>
</head>
<body class="min-h-screen text-gray-900">

<!-- HEADER -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 h-12 flex items-center justify-between gap-4">

    <!-- Logo + back link -->
    <div class="flex items-center gap-4">
      <a href="/" class="inline-flex items-center gap-1.5 text-xs font-medium text-gray-500 hover:text-gray-800 transition-colors duration-150 cursor-pointer">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
        </svg>
        Dashboard
      </a>
      <span class="text-gray-200 text-sm">|</span>
      <div class="flex items-center gap-2">
        <div class="w-6 h-6 rounded-md bg-[#DC2626] flex items-center justify-center flex-shrink-0">
          <span class="zh text-white font-bold text-xs leading-none">客</span>
        </div>
        <span class="text-sm font-medium text-gray-700 hidden sm:block">Hakshan <span class="text-gray-400 font-normal">/ News</span></span>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-2">
      <span id="last-updated" class="mono text-xs text-gray-400 hidden md:block mr-1"></span>
      <svg id="spinner" class="spin w-4 h-4 text-[#DC2626] hidden" viewBox="0 0 24 24" fill="none">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>
      </svg>
      <button id="btn-refresh"
        class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-md bg-[#DC2626] text-white hover:bg-[#B91C1C] transition-all duration-150 cursor-pointer">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/>
        </svg>
        <span id="btn-refresh-text">Refresh</span>
      </button>
    </div>
  </div>
</header>

<!-- Error banner -->
<div id="error-banner" class="hidden max-w-7xl mx-auto px-4 sm:px-6 mt-3">
  <div class="bg-red-50 border border-red-200 text-red-700 text-xs rounded-lg px-4 py-2.5 flex justify-between items-center">
    <span id="error-message"></span>
    <button onclick="hideError()" class="ml-3 cursor-pointer text-red-400 hover:text-red-600">
      <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
</div>

<!-- MAIN -->
<main class="max-w-7xl mx-auto px-4 sm:px-6 py-8">

  <!-- Page title -->
  <div class="pb-6 mb-6 border-b border-gray-100">
    <span class="section-label mb-1">Live Intelligence</span>
    <div class="flex items-center justify-between flex-wrap gap-3 mt-1">
      <h1 class="text-lg font-semibold text-gray-900">All News Articles</h1>
      <p id="article-summary" class="text-xs text-gray-400 mono"></p>
    </div>
  </div>

  <!-- Filter tabs -->
  <div class="flex flex-wrap gap-1.5 mb-6">
    <button class="tab active" onclick="filterNews('all', this)">
      All <span id="count-all" class="count">—</span>
    </button>
    <button class="tab" onclick="filterNews('hakshan', this)">
      Hakshan <span id="count-hakshan" class="count">—</span>
    </button>
    <button class="tab" onclick="filterNews('competitor', this)">
      Competitors <span id="count-competitor" class="count">—</span>
    </button>
    <button class="tab" onclick="filterNews('industry', this)">
      Industry <span id="count-industry" class="count">—</span>
    </button>
  </div>

  <!-- News grid -->
  <div id="news-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
    <div class="skeleton h-32 rounded-lg"></div>
    <div class="skeleton h-32 rounded-lg"></div>
    <div class="skeleton h-32 rounded-lg"></div>
    <div class="skeleton h-32 rounded-lg"></div>
    <div class="skeleton h-32 rounded-lg"></div>
    <div class="skeleton h-32 rounded-lg"></div>
  </div>

</main>

<footer class="mt-16 border-t border-gray-100">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-2 text-xs text-gray-400">
    <span>客善 Hakshan · News via Google News RSS · Auto-refreshes every 24h</span>
    <a href="/" class="text-gray-400 hover:text-gray-600 transition-colors cursor-pointer inline-flex items-center gap-1">
      <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
      Back to dashboard
    </a>
  </div>
</footer>

<script>
let allNews = [], activeFilter = 'all';

// ── Boot ─────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadData(false);
  document.getElementById('btn-refresh').addEventListener('click', handleRefresh);
});

async function loadData(force) {
  setLoading(true);
  try {
    const resp = await fetch(force ? '/api/refresh' : '/api/data', { method: force ? 'POST' : 'GET' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    allNews = data.news || [];
    updateCounts();
    renderNews(activeFilter);
    updateTimestamp(data.fetched_at);
    hideError();
  } catch(e) { showError('Could not load news: ' + e.message); }
  finally { setLoading(false); }
}

async function handleRefresh() {
  document.getElementById('btn-refresh').disabled = true;
  await loadData(true);
  document.getElementById('btn-refresh').disabled = false;
}

// ── Counts ────────────────────────────────────────────────────────────────
function updateCounts() {
  const cats = ['all', 'hakshan', 'competitor', 'industry'];
  cats.forEach(cat => {
    const n = cat === 'all' ? allNews.length : allNews.filter(a => a.category === cat).length;
    const el = document.getElementById('count-' + cat);
    if (el) el.textContent = n;
  });
  const el = document.getElementById('article-summary');
  if (el) el.textContent = `${allNews.length} articles fetched`;
}

// ── Render ────────────────────────────────────────────────────────────────
function renderNews(filter) {
  const filtered = filter === 'all' ? allNews : allNews.filter(a => a.category === filter);
  const container = document.getElementById('news-grid');

  if (!filtered.length) {
    container.innerHTML = `
      <div class="col-span-full bg-white border border-gray-200 rounded-lg text-center py-14">
        <p class="text-sm font-medium text-gray-600 mb-1">${allNews.length === 0 ? 'News temporarily unavailable' : 'No articles in this category'}</p>
        <p class="text-xs text-gray-400">Click <strong>Refresh</strong> to fetch the latest news from Google News RSS.</p>
      </div>`;
    return;
  }

  const catTag = { hakshan:'tag-red', competitor:'tag-amber', industry:'tag-blue' };
  const catLabel = { hakshan:'Hakshan', competitor:'Competitor', industry:'Industry' };
  container.innerHTML = filtered.map(a => `
    <a href="${sanitizeLink(a.link)}" target="_blank" rel="noopener noreferrer"
      class="block bg-white border border-gray-200 rounded-lg p-4 cursor-pointer transition-all duration-150 hover:border-gray-300 hover:shadow-sm flex flex-col gap-2.5">
      <div class="flex items-start justify-between gap-2">
        <h3 class="text-sm font-medium text-gray-900 leading-snug line-clamp-2 flex-1">${esc(a.title)}</h3>
        <svg class="w-3.5 h-3.5 text-gray-300 flex-shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/>
        </svg>
      </div>
      ${a.description ? `<p class="text-xs text-gray-500 line-clamp-2 flex-1">${esc(a.description)}</p>` : ''}
      <div class="flex items-center gap-2 pt-2 border-t border-gray-50 mt-auto">
        <span class="tag ${catTag[a.category] || 'tag-gray'}">${catLabel[a.category] || a.category}</span>
        ${a.source ? `<span class="text-xs text-gray-500 truncate max-w-[110px]">${esc(a.source)}</span>` : ''}
        <span class="mono text-xs text-gray-400 ml-auto">${fmtDate(a.pub_date)}</span>
      </div>
    </a>
  `).join('');
}

function filterNews(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b === btn));
  renderNews(cat);
}

// ── Helpers ───────────────────────────────────────────────────────────────
function updateTimestamp(iso) {
  if (!iso) return;
  try {
    const ageMs = Date.now() - new Date(iso).getTime();
    const h = Math.floor(ageMs / 3600000), m = Math.floor((ageMs % 3600000) / 60000);
    document.getElementById('last-updated').textContent = `Updated ${h>0?h+'h ':''}${m}m ago`;
  } catch {}
}

function setLoading(on) {
  document.getElementById('spinner').classList.toggle('hidden', !on);
  document.getElementById('btn-refresh-text').textContent = on ? 'Refreshing…' : 'Refresh';
}

function showError(msg) {
  document.getElementById('error-message').textContent = msg;
  document.getElementById('error-banner').classList.remove('hidden');
}
function hideError() { document.getElementById('error-banner').classList.add('hidden'); }

function esc(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(str || ''));
  return d.innerHTML;
}

function sanitizeLink(url) {
  if (!url) return '#';
  try { const u = new URL(url); return (u.protocol==='http:'||u.protocol==='https:') ? url : '#'; }
  catch { return '#'; }
}

function fmtDate(str) {
  if (!str) return '';
  try { return new Date(str).toLocaleDateString('en-MY',{day:'numeric',month:'short',year:'numeric'}); }
  catch { return str; }
}
</script>
</body>
</html>
